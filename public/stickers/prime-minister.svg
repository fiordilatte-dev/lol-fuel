<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" fill="none">
  <!-- Sticker border -->
  <ellipse cx="60" cy="70" rx="58" ry="68" fill="white" stroke="#FF6B00" stroke-width="3"/>
  <!-- Body/suit -->
  <path d="M25 120 Q30 95 40 90 Q50 85 60 85 Q70 85 80 90 Q90 95 95 120Z" fill="#2a2a2a"/>
  <!-- Tie -->
  <path d="M57 90 L60 105 L63 90Z" fill="#cc2233"/>
  <!-- Shirt collar -->
  <path d="M48 90 L60 98 L72 90" fill="white" stroke="white" stroke-width="1"/>
  <!-- Neck -->
  <rect x="52" y="75" width="16" height="18" rx="4" fill="#e8b890"/>
  <!-- Head -->
  <ellipse cx="60" cy="55" rx="28" ry="30" fill="#e8b890"/>
  <!-- Hair - grey, slightly wavy -->
  <path d="M32 50 Q30 28 50 22 Q60 20 70 22 Q90 28 88 50 Q85 35 70 30 Q60 28 50 30 Q35 35 32 50Z" fill="#909090"/>
  <path d="M32 50 Q28 45 33 38" fill="#909090"/>
  <path d="M88 50 Q92 45 87 38" fill="#909090"/>
  <!-- Ears -->
  <ellipse cx="32" cy="55" rx="5" ry="7" fill="#e8b890"/>
  <ellipse cx="88" cy="55" rx="5" ry="7" fill="#e8b890"/>
  <!-- Eyes -->
  <ellipse cx="48" cy="52" rx="4" ry="4.5" fill="white"/>
  <ellipse cx="72" cy="52" rx="4" ry="4.5" fill="white"/>
  <circle cx="49" cy="52.5" r="2.5" fill="#4a6a4a"/>
  <circle cx="73" cy="52.5" r="2.5" fill="#4a6a4a"/>
  <circle cx="50" cy="51.5" r="1" fill="white"/>
  <circle cx="74" cy="51.5" r="1" fill="white"/>
  <!-- Eyebrows -->
  <path d="M42 46 Q48 43 54 46" stroke="#707070" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M66 46 Q72 43 78 46" stroke="#707070" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M57 55 Q60 63 63 55" stroke="#c89878" stroke-width="2" fill="none"/>
  <!-- Mouth - grinning -->
  <path d="M48 68 Q60 76 72 68" stroke="#c47070" stroke-width="2.5" fill="#e08888" stroke-linecap="round"/>
  <!-- Crow's feet -->
  <path d="M38 52 L35 50" stroke="#c89878" stroke-width="1" stroke-linecap="round"/>
  <path d="M82 52 L85 50" stroke="#c89878" stroke-width="1" stroke-linecap="round"/>
  <!-- Speech bubble -->
  <path d="M75 15 Q110 8 108 28 Q106 40 90 38 L84 44 L85 36 Q75 33 75 15Z" fill="#FF6B00"/>
  <text x="91" y="24" text-anchor="middle" fill="white" font-size="6" font-weight="bold" font-family="monospace">IT'S A</text>
  <text x="91" y="33" text-anchor="middle" fill="white" font-size="6" font-weight="bold" font-family="monospace">FAIR GO!</text>
  <!-- Label -->
  <text x="60" y="135" text-anchor="middle" fill="#FF6B00" font-size="8" font-weight="bold" font-family="sans-serif">THE PM</text>
</svg>
