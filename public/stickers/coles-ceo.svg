<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" fill="none">
  <!-- Sticker border -->
  <ellipse cx="60" cy="70" rx="58" ry="68" fill="white" stroke="#e01020" stroke-width="3"/>
  <!-- Body/blazer - Coles red accent -->
  <path d="M25 120 Q30 95 40 90 Q50 85 60 85 Q70 85 80 90 Q90 95 95 120Z" fill="#1a1a3a"/>
  <!-- Coles red lapel pin -->
  <circle cx="42" cy="98" r="4" fill="#e01020"/>
  <text x="42" y="100" text-anchor="middle" fill="white" font-size="5" font-weight="bold">C</text>
  <!-- Shirt -->
  <path d="M48 90 L60 100 L72 90" fill="white" stroke="white" stroke-width="1"/>
  <!-- Neck -->
  <rect x="52" y="75" width="16" height="18" rx="4" fill="#f0c8a8"/>
  <!-- Head -->
  <ellipse cx="60" cy="55" rx="27" ry="29" fill="#f0c8a8"/>
  <!-- Hair - long dark brown -->
  <path d="M33 55 Q30 28 48 22 Q60 18 72 22 Q90 28 87 55 Q86 42 78 35 Q70 28 60 26 Q50 28 42 35 Q34 42 33 55Z" fill="#4a2a14"/>
  <path d="M33 55 Q30 65 32 75" fill="#4a2a14"/>
  <path d="M87 55 Q90 65 88 75" fill="#4a2a14"/>
  <!-- Eyes -->
  <ellipse cx="48" cy="52" rx="4" ry="4.5" fill="white"/>
  <ellipse cx="72" cy="52" rx="4" ry="4.5" fill="white"/>
  <circle cx="49" cy="52.5" r="2.5" fill="#5a3a20"/>
  <circle cx="73" cy="52.5" r="2.5" fill="#5a3a20"/>
  <circle cx="50" cy="51.5" r="1" fill="white"/>
  <circle cx="74" cy="51.5" r="1" fill="white"/>
  <!-- Eyebrows -->
  <path d="M42 46 Q48 43 54 46" stroke="#3a1a0a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M66 46 Q72 43 78 46" stroke="#3a1a0a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M58 55 Q60 61 62 55" stroke="#d4a888" stroke-width="1.5" fill="none"/>
  <!-- Mouth - corporate smile -->
  <path d="M50 66 Q60 73 70 66" stroke="#c06060" stroke-width="2" fill="#e89090" stroke-linecap="round"/>
  <!-- Earrings -->
  <circle cx="33" cy="58" r="2" fill="#FFD700"/>
  <circle cx="87" cy="58" r="2" fill="#FFD700"/>
  <!-- Speech bubble -->
  <path d="M75 12 Q112 5 110 25 Q108 38 92 36 L86 42 L87 34 Q75 30 75 12Z" fill="#e01020"/>
  <text x="92" y="20" text-anchor="middle" fill="white" font-size="5.5" font-weight="bold" font-family="monospace">PRICES</text>
  <text x="92" y="28" text-anchor="middle" fill="white" font-size="5.5" font-weight="bold" font-family="monospace">DOWN</text>
  <text x="92" y="35" text-anchor="middle" fill="white" font-size="5.5" font-weight="bold" font-family="monospace">DOWN!</text>
  <!-- Label -->
  <text x="60" y="135" text-anchor="middle" fill="#e01020" font-size="8" font-weight="bold" font-family="sans-serif">COLES CEO</text>
</svg>
