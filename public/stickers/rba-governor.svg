<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" fill="none">
  <!-- Sticker border -->
  <ellipse cx="60" cy="70" rx="58" ry="68" fill="white" stroke="#FF6B00" stroke-width="3"/>
  <!-- Body/suit -->
  <path d="M25 120 Q30 95 40 90 Q50 85 60 85 Q70 85 80 90 Q90 95 95 120Z" fill="#1a1a5e"/>
  <!-- Shirt collar -->
  <path d="M48 90 L60 100 L72 90" fill="white" stroke="white" stroke-width="1"/>
  <!-- Neck -->
  <rect x="52" y="75" width="16" height="18" rx="4" fill="#f4c5a0"/>
  <!-- Head -->
  <ellipse cx="60" cy="55" rx="28" ry="30" fill="#f4c5a0"/>
  <!-- Hair - short styled -->
  <path d="M32 48 Q32 25 60 22 Q88 25 88 48 Q85 38 60 35 Q35 38 32 48Z" fill="#8B6914"/>
  <path d="M32 48 Q30 42 35 38" fill="#8B6914"/>
  <path d="M88 48 Q90 42 85 38" fill="#8B6914"/>
  <!-- Eyes -->
  <ellipse cx="48" cy="52" rx="4" ry="4.5" fill="white"/>
  <ellipse cx="72" cy="52" rx="4" ry="4.5" fill="white"/>
  <circle cx="49" cy="52.5" r="2.5" fill="#3a3a3a"/>
  <circle cx="73" cy="52.5" r="2.5" fill="#3a3a3a"/>
  <circle cx="50" cy="51.5" r="1" fill="white"/>
  <circle cx="74" cy="51.5" r="1" fill="white"/>
  <!-- Eyebrows -->
  <path d="M42 46 Q48 43 54 46" stroke="#6B5510" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M66 46 Q72 43 78 46" stroke="#6B5510" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Glasses -->
  <rect x="39" y="47" width="18" height="13" rx="6" stroke="#888" stroke-width="1.5" fill="none"/>
  <rect x="63" y="47" width="18" height="13" rx="6" stroke="#888" stroke-width="1.5" fill="none"/>
  <line x1="57" y1="53" x2="63" y2="53" stroke="#888" stroke-width="1.5"/>
  <!-- Nose -->
  <path d="M58 56 Q60 62 62 56" stroke="#d4a07a" stroke-width="1.5" fill="none"/>
  <!-- Mouth - slightly stern -->
  <path d="M50 68 Q60 73 70 68" stroke="#c47070" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Speech bubble -->
  <path d="M78 20 Q108 15 105 32 Q102 42 88 40 L82 45 L84 38 Q78 35 78 20Z" fill="#FF6B00"/>
  <text x="91" y="30" text-anchor="middle" fill="white" font-size="7" font-weight="bold" font-family="monospace">RATE</text>
  <text x="91" y="38" text-anchor="middle" fill="white" font-size="7" font-weight="bold" font-family="monospace">HIKE!</text>
